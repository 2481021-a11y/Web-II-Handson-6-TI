<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml" xmlns:rel="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title th:text="${product.id !=null} ? 'Edit Produk' : 'tambah produk'">Form</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
    <div class=" container mt-4">
        <h1 th:text="${product.id !=null } ? 'Edit Produk' : 'Tambah Produk'">Form</h1>

        <form th:action="@{/products/save}" th:object="${product}" method="post" style="max-width:600px">

            <input type="hidden" th:field="*{id}">

            <!-- Nama Produk -->
            <div class="mb-3">
                <label for="name" class="form-Label">Nama Produk</label>
                <input type="text" th:field="*{name}" class="form-control" required>
            </div>

            <!-- Category -->
            <div class="mb-3">
                <label for="category" class="form-Label">Kategori</label>
                <select th:field="*{category}" class="from-select" required>
                    <option value="">-- Pilih Kategori --</option>
                    <option th:each="cat: ${categories}"
                            th:value="${cat}" th:text="${cat}">Kategori</option>
                </select>
    </div>
</body>
</html>
